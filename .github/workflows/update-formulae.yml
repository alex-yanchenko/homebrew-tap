name: Update formulae

# Manual fallback / backfill only. The automatic path is a direct push from each tool's
# release workflow (bumps the formula the instant the release publishes). This stays for
# re-syncing a formula on demand — it reads each tool's latest release and rewrites the
# formula's url + sha256 from the release asset's API digest, so nothing is downloaded.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump GitHub-release formulae
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # bump_from_github_release <formula> <owner/repo> <package-name>
          # Rewrites the formula's url + sha256 to the repo's latest published release.
          # Targets the prebuilt py3-none-any wheel — the formula installs that directly
          # rather than source-building the sdist (Homebrew's --no-binary can't build the
          # uv_build backend). A package with compiled/platform-specific wheels would need
          # a different asset pattern.
          bump_from_github_release() {
            formula="$1"; repo="$2"; pkg="$3"
            tag=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            if [ -z "$tag" ]; then
              echo "$repo: no published release yet — skipping"
              return
            fi
            version="${tag#v}"
            asset="${pkg}-${version}-py3-none-any.whl"
            digest=$(gh api "repos/$repo/releases/tags/$tag" \
              --jq ".assets[] | select(.name==\"$asset\") | .digest" 2>/dev/null || true)
            sha="${digest#sha256:}"
            if [ -z "$sha" ]; then
              echo "$repo $tag: sdist asset '$asset' not found — skipping"
              return
            fi
            url="https://github.com/$repo/releases/download/$tag/$asset"
            # The formula's url/sha256 lines are indented two spaces; anchor on that so
            # only the top-level stanza is touched, never a comment mentioning "url".
            sed -i -E "s|^  url \"[^\"]*\"|  url \"$url\"|" "Formula/$formula.rb"
            sed -i -E "s|^  sha256 \"[0-9a-f]{64}\"|  sha256 \"$sha\"|" "Formula/$formula.rb"
            echo "$formula → $tag ($sha)"
          }

          bump_from_github_release ccsearch alex-yanchenko/ccsearch ccsearch
          # skaldr is added here once it is published to PyPI — see README (it sources
          # from PyPI, not a GitHub release, so it needs a separate PyPI-based bump).

      - name: Commit if changed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: bump formulae to latest releases"
            git push
          else
            echo "no formula changes"
          fi
